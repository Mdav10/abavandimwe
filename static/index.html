<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ABAVANDIMWE | Secure Hacker Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0f;
            --bg-darker: #050508;
            --primary: #00ff41;
            --primary-glow: rgba(0, 255, 65, 0.3);
            --secondary: #ff00ff;
            --text: #e0e0e0;
            --text-dim: #888;
            --border: rgba(0, 255, 65, 0.2);
        }

        body {
            font-family: 'Courier New', 'Fira Code', 'Monaco', monospace;
            background: var(--bg-dark);
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        /* Hacker Animation */
        @keyframes glitch {
            0%, 100% { text-shadow: 0.05em 0 0 rgba(255,0,0,0.5), -0.05em -0.025em 0 rgba(0,255,0,0.5); }
            50% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,0.5), 0.025em 0.05em 0 rgba(0,255,0,0.5); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Scanline effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent 50%, rgba(0, 255, 65, 0.03) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
        }

        /* Login Screen */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-darker);
            z-index: 1000;
            transition: all 0.5s ease;
        }

        .login-card {
            background: rgba(10, 10, 15, 0.95);
            border: 2px solid var(--primary);
            border-radius: 8px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 40px var(--primary-glow);
            animation: glitch 3s infinite;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 28px;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            letter-spacing: 4px;
            font-weight: normal;
        }

        .logo p {
            color: var(--text-dim);
            font-size: 12px;
            margin-top: 8px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 12px;
            letter-spacing: 2px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 14px;
            color: var(--primary);
            font-family: monospace;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid var(--primary);
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--primary);
            font-family: monospace;
            letter-spacing: 2px;
        }

        .btn-primary:hover {
            background: var(--primary);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .features {
            margin-top: 32px;
            display: flex;
            justify-content: space-around;
            gap: 16px;
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }

        .feature {
            text-align: center;
            font-size: 10px;
            color: var(--text-dim);
        }

        .feature span {
            font-size: 20px;
            display: block;
            margin-bottom: 4px;
        }

        /* Chat Container */
        .chat-container {
            display: none;
            width: 100vw;
            height: 100vh;
            background: var(--bg-dark);
        }

        .chat-container.active {
            display: flex;
            flex-direction: column;
        }

        /* Chat Header */
        .chat-header {
            padding: 16px;
            background: rgba(5, 5, 8, 0.95);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .group-info h2 {
            color: var(--primary);
            font-size: 18px;
            letter-spacing: 2px;
        }

        .group-info p {
            color: var(--text-dim);
            font-size: 10px;
        }

        .online-count {
            color: var(--primary);
            font-size: 12px;
            background: rgba(0, 255, 65, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(5, 5, 8, 0.9);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h3 {
            color: var(--primary);
            font-size: 12px;
            letter-spacing: 2px;
        }

        .online-users {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }

        .user-item {
            padding: 8px 12px;
            margin-bottom: 6px;
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }

        .user-status {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            animation: pulse 2s infinite;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 8px 14px;
            border-radius: 8px;
            position: relative;
        }

        .message.sent .message-bubble {
            background: var(--primary);
            color: var(--bg-dark);
            border-right: 2px solid var(--primary);
        }

        .message.received .message-bubble {
            background: rgba(255, 255, 255, 0.05);
            border-left: 2px solid var(--primary);
        }

        .message-sender {
            font-size: 10px;
            margin-bottom: 4px;
            color: var(--primary);
        }

        .message-text {
            font-size: 13px;
            word-break: break-word;
        }

        .message-time {
            font-size: 9px;
            margin-top: 4px;
            opacity: 0.5;
        }

        .typing-indicator {
            padding: 8px 16px;
            color: var(--primary);
            font-size: 11px;
            font-style: italic;
        }

        .input-area {
            padding: 16px;
            background: rgba(5, 5, 8, 0.95);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--primary);
            font-family: monospace;
            font-size: 13px;
        }

        .input-area input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .input-area button {
            padding: 12px 24px;
            background: transparent;
            border: 1px solid var(--primary);
            border-radius: 4px;
            color: var(--primary);
            font-family: monospace;
            cursor: pointer;
            transition: all 0.3s;
        }

        .input-area button:hover {
            background: var(--primary);
            color: var(--bg-dark);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -260px;
                top: 0;
                bottom: 0;
                z-index: 100;
                transition: left 0.3s;
            }
            
            .sidebar.open {
                left: 0;
            }
            
            .menu-btn {
                display: block;
                background: transparent;
                border: 1px solid var(--primary);
                color: var(--primary);
                padding: 8px 12px;
                cursor: pointer;
            }
            
            .message {
                max-width: 90%;
            }
        }
        
        .menu-btn {
            display: none;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 12px;
            cursor: pointer;
            font-family: monospace;
        }
        
        .hidden {
            display: none !important;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-darker);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1># ABAVANDIMWE</h1>
                <p>> Secure Encrypted Messaging System</p>
                <p style="font-size: 10px;">by Mugisha Pc</p>
            </div>
            <div class="input-group">
                <label>$ USERNAME</label>
                <input type="text" id="username" placeholder="enter_username">
            </div>
            <div class="input-group">
                <label>$ GROUP</label>
                <input type="text" id="group" placeholder="enter_group">
            </div>
            <div class="input-group">
                <label>$ PASSWORD</label>
                <input type="password" id="password" placeholder="********">
            </div>
            <button class="btn-primary" onclick="connect()">>> CONNECT</button>
            <div class="features">
                <div class="feature"><span>🔒</span><small>AES-256</small></div>
                <div class="feature"><span>⏰</span><small>24H AUTO</small></div>
                <div class="feature"><span>👁️</span><small>E2EE</small></div>
            </div>
        </div>
    </div>

    <div id="chatContainer" class="chat-container">
        <div class="chat-header">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <div class="group-info">
                <h2 id="groupName"># LOADING</h2>
                <p>> secure channel</p>
            </div>
            <div class="online-count" id="onlineCount">0 online</div>
        </div>
        <div class="main-content">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h3>> ONLINE USERS</h3>
                </div>
                <div class="online-users" id="usersList">
                    <div class="user-item">connecting...</div>
                </div>
            </div>
            <div class="chat-area">
                <div class="messages" id="messages">
                    <div style="text-align: center; color: #888;">> connecting to secure server...</div>
                </div>
                <div class="typing-indicator" id="typingIndicator"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="> type encrypted message..." autocomplete="off">
                    <button onclick="sendMessage()">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws, username, group, password, groupSalt;
        let typingTimeout;

        async function encrypt(text, pwd, salt) {
            const encoder = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey('raw', encoder.encode(pwd), 'PBKDF2', false, ['deriveKey']);
            const key = await crypto.subtle.deriveKey({
                name: 'PBKDF2', salt: encoder.encode(salt), iterations: 100000, hash: 'SHA-256'
            }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt']);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoder.encode(text));
            const combined = new Uint8Array(iv.length + encrypted.byteLength);
            combined.set(iv, 0);
            combined.set(new Uint8Array(encrypted), iv.length);
            return btoa(String.fromCharCode.apply(null, combined));
        }

        async function decrypt(encrypted, pwd, salt) {
            const combined = Uint8Array.from(atob(encrypted), c => c.charCodeAt(0));
            const iv = combined.slice(0, 12);
            const ciphertext = combined.slice(12);
            const encoder = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey('raw', encoder.encode(pwd), 'PBKDF2', false, ['deriveKey']);
            const key = await crypto.subtle.deriveKey({
                name: 'PBKDF2', salt: encoder.encode(salt), iterations: 100000, hash: 'SHA-256'
            }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
            const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
            return new TextDecoder().decode(decrypted);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function connect() {
            username = document.getElementById('username').value.trim();
            group = document.getElementById('group').value.trim();
            password = document.getElementById('password').value;

            if (!username || !group || !password) {
                alert('> ERROR: All fields required');
                return;
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.hostname}:8080`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'join', username, group, password }));
            };

            ws.onmessage = async (e) => {
                const data = JSON.parse(e.data);
                
                if (data.type === 'ready') {
                    groupSalt = data.salt;
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('chatContainer').classList.add('active');
                    document.getElementById('groupName').innerHTML = `# ${data.group}`;
                } else if (data.type === 'message') {
                    try {
                        const decrypted = await decrypt(data.ciphertext, password, data.salt);
                        addMessage(data.sender, decrypted, data.sender === username);
                    } catch(e) {
                        addMessage(data.sender, '🔒 [ENCRYPTED]', data.sender === username);
                    }
                } else if (data.type === 'history') {
                    try {
                        const decrypted = await decrypt(data.ciphertext, password, data.salt);
                        addMessage(data.sender, decrypted, data.sender === username, true);
                    } catch(e) {
                        addMessage(data.sender, '🔒 [ENCRYPTED]', data.sender === username, true);
                    }
                } else if (data.type === 'users') {
                    updateUsers(data.users);
                } else if (data.type === 'typing') {
                    document.getElementById('typingIndicator').innerHTML = `> ${data.user} is typing...`;
                } else if (data.type === 'stop_typing') {
                    document.getElementById('typingIndicator').innerHTML = '';
                }
            };
        }

        function addMessage(sender, text, isSent, isHistory = false) {
            const messagesDiv = document.getElementById('messages');
            if (messagesDiv.children.length === 1 && messagesDiv.children[0].innerText.includes('connecting')) {
                messagesDiv.innerHTML = '';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            messageDiv.innerHTML = `
                <div class="message-sender">${isSent ? 'YOU' : sender.toUpperCase()}</div>
                <div class="message-bubble">
                    <div class="message-text">${escapeHtml(text)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function updateUsers(users) {
            const usersDiv = document.getElementById('usersList');
            document.getElementById('onlineCount').innerHTML = `${users.length} online`;
            
            if (users.length === 0) {
                usersDiv.innerHTML = '<div class="user-item">> no users online</div>';
                return;
            }
            
            usersDiv.innerHTML = users.map(u => `
                <div class="user-item">
                    <div class="user-status"></div>
                    <div>${escapeHtml(u)}</div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('messageInput')?.addEventListener('input', () => {
            if (ws?.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'typing' }));
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    ws.send(JSON.stringify({ type: 'stop_typing' }));
                }, 1000);
            }
        });

        document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
            
            try {
                const ciphertext = await encrypt(text, password, groupSalt);
                ws.send(JSON.stringify({ type: 'message', ciphertext, salt: groupSalt }));
                input.value = '';
            } catch(e) {
                console.error('Encryption error:', e);
            }
        }
    </script>
</body>
</html>
